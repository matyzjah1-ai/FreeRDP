name: Windows VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: windows-2025

    steps:  
      - name: Configure RDP  
        shell: powershell  
        run: |  
          net user Studio Mateusz123 /add
          net localgroup Administrators Studio /add
          net user Studio Mateusz123

          Set-ItemProperty `  
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `  
            -Name "fDenyTSConnections" `  
            -Value 0  

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"  
          Write-Host "RDP configured for user: Studio"  

      - name: Optimize RDP Performance  
        shell: powershell  
        run: |  
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableAudioCapture /t REG_DWORD /d 1 /f  
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableCam /t REG_DWORD /d 1 /f  
          Write-Host "RDP optimized"  

      - name: Set Dark Mode  
        shell: powershell  
        run: |  
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" /v AppsUseLightTheme /t REG_DWORD /d 0 /f  
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize" /v SystemUsesLightTheme /t REG_DWORD /d 0 /f  
          Write-Host "Dark mode enabled"  

      - name: Install Tailscale  
        shell: powershell  
        run: |  
          winget install --id Tailscale.Tailscale --silent --accept-package-agreements --accept-source-agreements  
          Start-Sleep 15  
          & "C:\Program Files\Tailscale\tailscale.exe" version  

      - name: Connect Tailscale  
        shell: powershell  
        run: |  
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}  

      - name: Show Tailscale IP  
        shell: powershell  
        run: |  
          Start-Sleep 10  
          Write-Host "Tailscale IP:"  
          & "C:\Program Files\Tailscale\tailscale.exe" ip  

- name: Install Roblox Studio
  shell: powershell
  run: |
    $installer="$env:TEMP\RobloxStudioInstaller.exe"
    Invoke-WebRequest -Uri "https://setup.rbxcdn.com/RobloxStudioInstaller.exe" -OutFile $installer
    Start-Process $installer
    $timeout=600
    $time=0
    while($time -lt $timeout){
      $studio=Get-ChildItem "$env:LOCALAPPDATA\Roblox\Versions" -Recurse -Filter RobloxStudioBeta.exe -ErrorAction SilentlyContinue
      if($studio){
        Write-Host "Roblox Studio installed:"
        Write-Host $studio.FullName
        break
      }
      Start-Sleep 10
      $time+=10
    }

- name: Install Apps via Winget
  shell: powershell
  run: |
    winget install --id Mozilla.Firefox --silent --accept-package-agreements --accept-source-agreements
    winget install --id OBSProject.OBSStudio --silent --accept-package-agreements --accept-source-agreements
    winget install --id Discord.Discord --silent --accept-package-agreements --accept-source-agreements
    winget install --id Notepad++.Notepad++ --silent --accept-package-agreements --accept-source-agreements

      - name: Keep Alive  
        shell: powershell  
        run: |  
          while($true){  
            Write-Host "Windows VPS running..."  
            Start-Sleep 300  
          }
