<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub VM Script Generator</title>
<link rel="stylesheet" href="https://unpkg.com/7.css">
<style>
body {
    background: #3a6ea5;
    min-height: 100vh;
    margin: 0;
    padding: 8px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: "Segoe UI", Tahoma, sans-serif;
}
.app-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
}
.window {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
}
.os-btn {
    width: 100%;
    min-height: 55px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    font-size: 11px;
}
.os-btn.active-os {
    background: linear-gradient(#e5f4fc, #c4e5f6 30% 50%, #98d1ef 50%, #68b3db);
    border-color: #3c7fb1;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #0002;
}
.os-icon {
    width: 20px;
    height: 20px;
}
.field-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 100%;
}
.checks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}
.creds-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}
.section-gap {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
#script-output {
    background: #0c0c0c;
    color: #33ff66;
    padding: 8px;
    font-family: Consolas, monospace;
    font-size: 10px;
    overflow-x: auto;
    max-height: 220px;
    margin: 0;
    white-space: pre;
    border: 1px solid #707070;
}
.output-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
}
input[type="text"], select {
    width: 100%;
    box-sizing: border-box;
}
</style>
</head>
<body>

<div class="app-wrap">
<div class="window">
    <div class="title-bar">
        <div class="title-bar-text">GitHub VM Script Generator</div>
        <div class="title-bar-controls">
            <button aria-label="Minimize"></button>
            <button aria-label="Maximize"></button>
            <button aria-label="Close"></button>
        </div>
    </div>

    <div class="window-body section-gap">
        <p style="margin: 0;">Generate automated workflow scripts for self-hosted cloud environments via GitHub Actions.</p>

        <!-- Step 1: OS Selection -->
        <fieldset>
            <legend>1. Pick Your Preferred OS</legend>
            <div class="field-grid">
                <button type="button" id="btn-windows" onclick="selectOS('windows')" class="os-btn active-os">
                    <svg class="os-icon" viewBox="0 0 24 24"><path fill="#00A4EF" d="M0 3.5L9.8 2.2v9.3H0V3.5zm10.9-1.4L24 0v11h-13V2.1zM0 12.7h9.8V22L0 20.7V12.7zm10.9 0H24V24l-13-1.8V12.7z"/></svg>
                    Windows
                </button>
                <button type="button" id="btn-macos" onclick="selectOS('macos')" class="os-btn">
                    <svg class="os-icon" viewBox="0 0 24 24"><path fill="#111" d="M18.7 12.5c0-3 2.5-4.5 2.6-4.6-1.4-2.1-3.6-2.4-4.4-2.4-1.9-.2-3.6 1.1-4.6 1.1s-2.4-1.1-4-1.1c-2 0-3.9 1.2-4.9 3-2.1 3.6-.5 9 1.5 12 1 1.5 2.2 3.1 3.7 3 1.5-.1 2-1 3.8-1s2.3 1 3.8 1c1.6 0 2.6-1.4 3.6-2.9 1.1-1.7 1.6-3.3 1.6-3.4-.1 0-3.1-1.2-3.7-4.7zM15.4 3.6c.8-1 1.4-2.4 1.2-3.8-1.2.05-2.6.8-3.5 1.8-.8.9-1.5 2.3-1.3 3.7 1.4.1 2.7-.7 3.6-1.7z"/></svg>
                    macOS
                </button>
                <button type="button" id="btn-linux" onclick="selectOS('linux')" class="os-btn">
                    <svg class="os-icon" viewBox="0 0 24 24"><path fill="#111" d="M12.5.4c-2 0-3.2 2.6-3.2 5.2 0 1-.1 1.8-.6 2.7-.6 1.1-1.6 2-2.3 3.1-1 1.5-1.4 3.3-1.2 5 .1.9-.2 1.6-.7 2.3-.4.6-.9 1.2-.9 2 0 .7.6 1.2 1.3 1.2.5 0 .9-.2 1.4-.3.6-.1 1.1.1 1.6.4.8.4 1.6.8 2.5.9 1.1.1 2.2-.3 3.2-.8.5-.2 1-.5 1.6-.4.5.1.9.3 1.4.3.7 0 1.3-.5 1.3-1.2 0-.8-.5-1.4-.9-2-.5-.7-.8-1.4-.7-2.3.2-1.7-.2-3.5-1.2-5-.7-1.1-1.7-2-2.3-3.1-.5-.9-.6-1.7-.6-2.7 0-2.6-1.2-5.2-3.2-5.2zm-1.7 5.7c.5 0 .9.6.9 1.3s-.4 1.3-.9 1.3-.9-.6-.9-1.3.4-1.3.9-1.3zm3.4 0c.5 0 .9.6.9 1.3s-.4 1.3-.9 1.3-.9-.6-.9-1.3.4-1.3.9-1.3z"/></svg>
                    Linux
                </button>
            </div>
        </fieldset>

        <!-- Step 2: Version Selection -->
        <div class="field-row-stacked">
            <label for="os-version">2. Pick your Version</label>
            <select id="os-version" onchange="checkVersionSelection()"></select>
        </div>

        <!-- Windows Credentials Step -->
        <fieldset id="windows-creds-container">
            <legend>RDP Account Credentials &amp; System Options</legend>
            <div class="creds-grid">
                <div class="field-row-stacked">
                    <label for="win-user">New Username</label>
                    <input type="text" id="win-user" value="runneradmin">
                </div>
                <div class="field-row-stacked">
                    <label for="win-pass">Password</label>
                    <input type="text" id="win-pass" value="Password123!">
                </div>
            </div>
            <div style="border-top: 1px solid #d4d4d4; padding-top: 8px; margin-top: 6px; display: flex; flex-direction: column; gap: 4px;">
                <div class="field-row">
                    <input type="checkbox" id="win-install-winget" checked>
                    <label for="win-install-winget">Install winget (Package Manager)</label>
                </div>
                <div class="field-row">
                    <input type="checkbox" id="win-debloat" checked>
                    <label for="win-debloat">Debloat Windows (Remove unused SDKs)</label>
                </div>
                <div class="field-row">
                    <input type="checkbox" id="win-black-wallpaper" checked>
                    <label for="win-black-wallpaper">Set Solid Black Wallpaper (Faster RDP)</label>
                </div>
            </div>
        </fieldset>

        <!-- Step 3: Remote Provider Setup -->
        <fieldset>
            <legend>3. Remote Connection Provider</legend>
            <p style="font-weight: bold; margin: 0 0 4px 0;">Tailscale</p>
            <div class="window" style="box-shadow: none;">
                <div class="window-body">
                    <p style="margin: 0 0 4px 0; font-weight: bold;">Setup Process:</p>
                    <ol style="margin: 0; padding-left: 16px; font-size: 8.5pt;">
                        <li>Get your Auth Token from Tailscale (Reusable &amp; Ephemeral).</li>
                        <li>Go to GitHub &rarr; <strong>Settings</strong> &rarr; <strong>Secrets</strong> &rarr; <strong>Actions</strong>.</li>
                        <li>Create secret <code>TAILSCALE_AUTH_KEY</code>.</li>
                    </ol>
                </div>
            </div>
        </fieldset>

        <!-- Step 4: Choose Apps -->
        <fieldset>
            <legend>4. Choose apps to install</legend>
            <div class="checks-grid">
                <div class="field-row">
                    <input type="checkbox" value="firefox" checked id="app-ff">
                    <label for="app-ff">Firefox</label>
                </div>
                <div class="field-row">
                    <input type="checkbox" value="roblox" id="app-rbx">
                    <label for="app-rbx">Roblox Studio</label>
                </div>
                <div class="field-row">
                    <input type="checkbox" value="obs" id="app-obs">
                    <label for="app-obs">OBS Studio</label>
                </div>
                <div class="field-row">
                    <input type="checkbox" value="notepadpp" id="app-npp">
                    <label for="app-npp">Notepad++</label>
                </div>
            </div>
        </fieldset>

        <!-- Action Button -->
        <button type="button" onclick="generateScript()" style="width: 100%;">
            Generate Script
        </button>

        <!-- Output Section -->
        <div id="output-section" style="display: none;" class="section-gap">
            <div class="window" style="box-shadow: none;">
                <div class="window-body">
                    <p style="margin: 0 0 2px 0; font-weight: bold;">Script Generated!</p>
                    <p style="margin: 0; font-size: 8.5pt;">Save as <code id="workflow-filename">windows-vps.yml</code> in <code>.github/workflows/</code>.</p>
                </div>
            </div>

            <div>
                <div class="output-toolbar">
                    <button type="button" onclick="copyScript()">Copy Script</button>
                </div>
                <pre id="script-output"></pre>
            </div>
        </div>

    </div>

    <div class="status-bar">
        <p class="status-bar-field">Ready</p>
        <p class="status-bar-field">Generator Fixed</p>
    </div>
</div>
</div>

<script>
    var versions = {
        windows: [
            { name: 'Windows Server 2025', value: 'windows-2025' },
            { name: 'Windows Server 2022', value: 'windows-2022' },
            { name: 'Windows Server 2019', value: 'windows-2019' }
        ],
        macos: [
            { name: 'macOS 15 (Sequoia)', value: 'macos-15' },
            { name: 'macOS 14 (Sonoma)', value: 'macos-14' },
            { name: 'macOS 13 (Ventura)', value: 'macos-13' }
        ],
        linux: [
            { name: 'Ubuntu 24.04 LTS', value: 'ubuntu-24.04' },
            { name: 'Ubuntu 22.04 Minimal', value: 'ubuntu-22.04-minimal' },
            { name: 'Ubuntu 20.04 LTS', value: 'ubuntu-20.04' }
        ]
    };

    var currentOS = 'windows';

    function selectOS(os) {
        currentOS = os;
        var buttons = document.querySelectorAll('.os-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('active-os');
        }
        var selectedBtn = document.getElementById('btn-' + os);
        if (selectedBtn) {
            selectedBtn.classList.add('active-os');
        }

        var credsContainer = document.getElementById('windows-creds-container');
        credsContainer.style.display = (os === 'windows') ? 'block' : 'none';

        var versionSelect = document.getElementById('os-version');
        versionSelect.innerHTML = '';
        var list = versions[os] || [];
        for (var j = 0; j < list.length; j++) {
            var opt = document.createElement('option');
            opt.value = list[j].value;
            opt.textContent = list[j].name;
            versionSelect.appendChild(opt);
        }
        checkVersionSelection();
    }

    function checkVersionSelection() {
        var versionSelect = document.getElementById('os-version');
        var wingetCheckbox = document.getElementById('win-install-winget');
        if (currentOS === 'windows' && versionSelect.value === 'windows-2025') {
            wingetCheckbox.checked = false;
            wingetCheckbox.disabled = true;
        } else {
            wingetCheckbox.disabled = false;
        }
    }

    function generateScript() {
        var runnerVersion = document.getElementById('os-version').value;
        document.getElementById('workflow-filename').textContent = currentOS + '-vps.yml';
        
        var username = document.getElementById('win-user') ? document.getElementById('win-user').value : 'runneradmin';
        var password = document.getElementById('win-pass') ? document.getElementById('win-pass').value : 'Password123!';
        
        var apps = [];
        var appCheckboxes = document.querySelectorAll('.checks-grid input[type="checkbox"]');
        for (var i = 0; i < appCheckboxes.length; i++) {
            if (appCheckboxes[i].checked) {
                apps.push(appCheckboxes[i].value);
            }
        }

        var scriptContent = "name: " + currentOS.toUpperCase() + " VPS\n" +
            "on: [workflow_dispatch]\n\n" +
            "jobs:\n" +
            "  build:\n" +
            "    runs-on: " + runnerVersion + "\n" +
            "    steps:\n" +
            "      - name: Checkout Code\n" +
            "        uses: actions/checkout@v4\n\n";

        if (currentOS === 'windows') {
            scriptContent += "      - name: Enable RDP\n" +
                "        run: |\n" +
                "          Set-ItemProperty -Path 'HKLM:\\System\\CurrentControlSet\\Control\\Terminal Server' -Name \"fDenyTSConnections\" -Value 0\n" +
                "          Enable-NetFirewallRule -DisplayGroup \"Remote Desktop\"\n" +
                "          Set-ItemProperty -Path 'HKLM:\\System\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp' -Name \"UserAuthentication\" -Value 1\n\n" +
                "      - name: Set Administrator Credentials\n" +
                "        run: |\n" +
                "          $account = [adsi]\"WinNT://./$([Environment]::UserName)\"\n" +
                "          $account.SetPassword('" + password + "')\n";
            
            if (document.getElementById('win-black-wallpaper').checked) {
                scriptContent += "\n      - name: Set Black Wallpaper\n" +
                    "        run: Set-ItemProperty -Path 'HKCU:\\Control Panel\\Desktop' -Name Wallpaper -Value ''\n";
            }
        }

        scriptContent += "\n      - name: Connect via Tailscale\n" +
            "        uses: tailscale/github-action@v2\n" +
            "        with:\n" +
            "          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}\n" +
            "          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}\n" +
            "          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}\n" +
            "          version: latest\n\n" +
            "      - name: Keep Runner Alive\n" +
            "        run: |\n" +
            "          Write-Host 'VM is ready and connected via Tailscale!'\n" +
            "          Start-Sleep -Seconds 21600";

        document.getElementById('script-output').textContent = scriptContent;
        document.getElementById('output-section').style.display = 'flex';
    }

    function copyScript() {
        var text = document.getElementById('script-output').textContent;
        navigator.clipboard.writeText(text).then(function() {
            alert('Copied script to clipboard!');
        });
    }

    window.onload = function() {
        selectOS('windows');
    };
</script>
</body>
</html>
