name: macOS Tahoe VNC Remote Desktop

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  remote-desktop:
    runs-on: macos-26 # macOS Tahoe
    timeout-minutes: 120 # Keeps job alive for up to 2 hours

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Runner User Password & Enable VNC
        run: |
          # 1. Set password for the runner user (Required for VNC & Sudo)
          echo "runner:Password123!" | sudo chpasswd
          
          # 2. Enable built-in macOS Screen Sharing / VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw Password123! \
            -restart -agent -privs -all

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Output Tailscale IP & Connection Info
        run: |
          TS_IP=$(tailscale ip -4)
          echo "=========================================================="
          echo " macOS Tahoe VNC Server Ready!"
          echo " Tailscale IP: $TS_IP"
          echo " VNC Address:  vnc://$TS_IP"
          echo " Username:     runner"
          echo " Password:     Password123!"
          echo "=========================================================="

      - name: Keep Runner Alive
        run: |
          echo "Waiting for remote desktop session..."
          # Sleep loop to keep the workflow running
          sleep 7200
