name: Windows VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: windows-2022

    steps:
      - name: Configure RDP Credentials
        shell: powershell
        run: |
          if ('Mateusz' -ne 'runneradmin') {
            Rename-LocalUser -Name 'runneradmin' -NewName 'Mateusz'
          }
          net user Mateusz Password123!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Set-NetFirewallRule -Name 'RemoteDesktop-UserMode-In-TCP' -Enabled True -ErrorAction SilentlyContinue
          Write-Host "RDP enabled for Mateusz"

      - name: Install Winget
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $WorkDir = Join-Path $env:TEMP 'winget-install'
          $DepsDir = Join-Path $WorkDir 'DesktopAppInstaller_Dependencies'
          New-Item -ItemType Directory -Force -Path $WorkDir | Out-Null

          # Get latest stable WinGet release from GitHub
          $Release = Invoke-RestMethod -Uri 'https://api.github.com/repos/microsoft/winget-cli/releases/latest'
          $MsixBundle = $Release.assets | Where-Object { $_.name -eq 'Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle' } | Select-Object -First 1
          $DependenciesZip = $Release.assets | Where-Object { $_.name -eq 'DesktopAppInstaller_Dependencies.zip' } | Select-Object -First 1
          $LicenseFile = $Release.assets | Where-Object { $_.name -like '*_License1.xml' } | Select-Object -First 1

          if (-not $MsixBundle -or -not $DependenciesZip -or -not $LicenseFile) {
              throw 'Could not find all required WinGet release assets.'
          }

          $MsixBundlePath = Join-Path $WorkDir 'Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle'
          $DependenciesZipPath = Join-Path $WorkDir 'DesktopAppInstaller_Dependencies.zip'
          $LicensePath = Join-Path $WorkDir 'license.xml'

          # Download WinGet, dependencies, and license
          Invoke-WebRequest -Uri $MsixBundle.browser_download_url -OutFile $MsixBundlePath
          Invoke-WebRequest -Uri $DependenciesZip.browser_download_url -OutFile $DependenciesZipPath
          Invoke-WebRequest -Uri $LicenseFile.browser_download_url -OutFile $LicensePath

          # Extract and install dependencies
          Expand-Archive -Path $DependenciesZipPath -DestinationPath $DepsDir -Force
          $Architecture = 'x64'
          $DependencyPath = Join-Path $DepsDir $Architecture

          Get-ChildItem -Path $DependencyPath -File | Where-Object { $_.Extension -in '.appx', '.msix' } | ForEach-Object {
              Add-AppxPackage -Path $_.FullName
          }

          # Provision App Installer / WinGet
          Add-AppxProvisionedPackage -Online -PackagePath $MsixBundlePath -LicensePath $LicensePath
          Add-AppxPackage -RegisterByFamilyName -MainPackage Microsoft.DesktopAppInstaller_8wekyb3d8bbwe

          # Verify
          winget --info

      - name: Optimize RDP Performance
        shell: powershell
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableAudioCapture /t REG_DWORD /d 1 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableCam /t REG_DWORD /d 1 /f
          Write-Host "RDP optimized"

      - name: Debloat System
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "Debloating runner environment..."
          $uninstallPaths = @(
            "C:\Program Files\Unity Hub\Uninstall Unity Hub.exe",
            "C:\Program Files\R\R-4.6.1\unins000.exe",
            "C:\rtools45\unins000.exe"
          )
          foreach($path in $uninstallPaths){
            if(Test-Path $path){
              Start-Process $path -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
            }
          }

      - name: Set Solid Black Wallpaper
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $path="$env:USERPROFILE\black.bmp"
          $bmp=New-Object System.Drawing.Bitmap 1920,1080
          $gfx=[System.Drawing.Graphics]::FromImage($bmp)
          $gfx.Clear([System.Drawing.Color]::Black)
          $bmp.Save($path)
          $gfx.Dispose()
          $bmp.Dispose()
          reg add "HKCU\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d $path /f
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep 2
          Start-Process explorer.exe

      - name: Install Tailscale Direct
        shell: powershell
        run: |
          $tsInstaller = "$env:TEMP\tailscale-setup.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-full-1.98.9.exe" -OutFile $tsInstaller
          Start-Process -FilePath $tsInstaller -ArgumentList "/quiet /norestart" -Wait
          Start-Sleep 5
          & "C:\Program Files\Tailscale\tailscale.exe" version

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Show Tailscale IP
        shell: powershell
        run: |
          Start-Sleep 5
          Write-Host "Tailscale IP:"
          & "C:\Program Files\Tailscale\tailscale.exe" ip

      - name: Install Firefox
        shell: powershell
        run: |
          $ff = "$env:TEMP\firefox.exe"
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-latest-ssl&os=win64&lang=en-US" -OutFile $ff
          Start-Process $ff -ArgumentList "-ms" -Wait

      - name: Keep Alive
        shell: powershell
        run: |
          while($true){
            Write-Host "Windows VPS running..."
            Start-Sleep 300
          }
