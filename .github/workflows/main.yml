name: Windows VPS

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: windows-2022

    steps:
      - name: Configure RDP Credentials
        shell: powershell
        run: |
          if ('Mateusz' -ne 'runneradmin') {
            Rename-LocalUser -Name 'runneradmin' -NewName 'Mateusz'
          }
          net user Mateusz Password123!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Set-NetFirewallRule -Name 'RemoteDesktop-UserMode-In-TCP' -Enabled True -ErrorAction SilentlyContinue
          Write-Host "RDP enabled for Mateusz"

      - name: Install Winget
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $downloadDir = 'C:\WinGetInstall'
          if (-not (Test-Path $downloadDir)) { New-Item -Path $downloadDir -ItemType Directory | Out-Null }
          Push-Location $downloadDir

          # Download dependencies & winget
          Invoke-WebRequest -Uri 'https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx' -OutFile 'vclibs.appx'
          Invoke-WebRequest -Uri 'https://github.com/microsoft/microsoft-ui-xaml/releases/download/v2.8.6/Microsoft.UI.Xaml.2.8.x64.appx' -OutFile 'xaml.appx'
          Invoke-WebRequest -Uri 'https://aka.ms/getwinget' -OutFile 'winget.msixbundle'

          # Fetch matching license file for DISM provisioning
          $releasesUri = 'https://api.github.com/repos/microsoft/winget-cli/releases/latest'
          $licenseUrl = ((Invoke-RestMethod -Uri $releasesUri).assets | Where-Object name -like '*.xml').browser_download_url
          Invoke-WebRequest -Uri $licenseUrl -OutFile 'license.xml'

          # System-wide provision via DISM
          $deps = @("$downloadDir\vclibs.appx", "$downloadDir\xaml.appx")
          Add-AppxProvisionedPackage -Online -PackagePath "$downloadDir\winget.msixbundle" -LicensePath "$downloadDir\license.xml" -DependencyPackagePath $deps
          Add-AppxPackage -RegisterByFamilyName -MainPackage 'Microsoft.DesktopAppInstaller_8wekyb3d8bbwe' -ErrorAction SilentlyContinue

          # Refresh Session PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
          Pop-Location
          Remove-Item $downloadDir -Recurse -Force -ErrorAction SilentlyContinue

      - name: Optimize RDP Performance
        shell: powershell
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableAudioCapture /t REG_DWORD /d 1 /f
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" /v fDisableCam /t REG_DWORD /d 1 /f
          Write-Host "RDP optimized"

      - name: Debloat System
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "Debloating runner environment..."
          $uninstallPaths = @(
            "C:\Program Files\Unity Hub\Uninstall Unity Hub.exe",
            "C:\Program Files\R\R-4.6.1\unins000.exe",
            "C:\rtools45\unins000.exe"
          )
          foreach($path in $uninstallPaths){
            if(Test-Path $path){
              Start-Process $path -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
            }
          }

      - name: Set Solid Black Wallpaper
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Drawing
          $path="$env:USERPROFILE\black.bmp"
          $bmp=New-Object System.Drawing.Bitmap 1920,1080
          $gfx=[System.Drawing.Graphics]::FromImage($bmp)
          $gfx.Clear([System.Drawing.Color]::Black)
          $bmp.Save($path)
          $gfx.Dispose()
          $bmp.Dispose()
          reg add "HKCU\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d $path /f
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep 2
          Start-Process explorer.exe

      - name: Install Tailscale Direct
        shell: powershell
        run: |
          $tsInstaller = "$env:TEMP\tailscale-setup.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-full-1.98.9.exe" -OutFile $tsInstaller
          Start-Process -FilePath $tsInstaller -ArgumentList "/quiet /norestart" -Wait
          Start-Sleep 5
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
          $tsExe = Get-Command tailscale -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $tsExe) {
              $tsExe = @("C:\Program Files\Tailscale\tailscale.exe", "C:\Program Files (x86)\Tailscale\tailscale.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $tsExe) { throw 'Tailscale executable could not be located after installation.' }
          & $tsExe version

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tsExe = Get-Command tailscale -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $tsExe) {
              $tsExe = @("C:\Program Files\Tailscale\tailscale.exe", "C:\Program Files (x86)\Tailscale\tailscale.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Show Tailscale IP
        shell: powershell
        run: |
          Start-Sleep 5
          $tsExe = Get-Command tailscale -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $tsExe) {
              $tsExe = @("C:\Program Files\Tailscale\tailscale.exe", "C:\Program Files (x86)\Tailscale\tailscale.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          Write-Host "Tailscale IP:"
          & $tsExe ip

      - name: Install Firefox
        shell: powershell
        run: |
          $ff = "$env:TEMP\firefox.exe"
          Invoke-WebRequest -Uri "https://download.mozilla.org/?product=firefox-latest-ssl&os=win64&lang=en-US" -OutFile $ff
          Start-Process $ff -ArgumentList "-ms" -Wait

      - name: Keep Alive
        shell: powershell
        run: |
          while($true){
            Write-Host "Windows VPS running..."
            Start-Sleep 300
          }
