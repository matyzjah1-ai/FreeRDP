name: macOS VM

on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: macos-15

    steps:
      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo tailscaled &
          sleep 5

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Show Tailscale IP
        run: |
          tailscale ip
      - name: Keep Alive
        run: |
          while true; do
            echo "macOS VM running..."
            sleep 300
          done
