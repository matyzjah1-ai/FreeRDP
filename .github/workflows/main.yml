name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-15 # (Or macos-26)
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Runner Password & Enable WindowServer Desktop
        run: |
          # 1. Set password for the 'runner' account
          printf "Password123!\nPassword123!\n" | sudo passwd runner
          
          # 2. Grant permissions to remote control without prompt
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist VNCOnlyLocalConnections -bool false
          
          # 3. Enable Screen Sharing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw Password123! \
            -restart -agent -privs -all -console

      - name: Install and Connect Tailscale
        run: |
          brew install tailscale
          sudo tailscaled &
          sleep 5
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Output Tailscale IP & Connection Info
        run: |
          TS_IP=$(tailscale ip -4)
          echo "=========================================================="
          echo " macOS VNC Server Ready!"
          echo " Tailscale IP: $TS_IP"
          echo " VNC Address:  vnc://$TS_IP"
          echo " Username:     runner"
          echo " Password:     Password123!"
          echo "=========================================================="

      - name: Keep Runner Alive
        run: |
          echo "Waiting for remote desktop session..."
          sleep 7200
