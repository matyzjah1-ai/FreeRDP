name: WINDOWS VPS
on:
  workflow_dispatch:

jobs:
  vps:
    runs-on: windows-2025
    steps:
      - name: Enable Remote Desktop (RDP)
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Set Custom User Credentials
        run: |
          $user = 'runneradmin'
          $pass = 'Password123!'
          if (-not (Get-LocalUser -Name $user -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $user -Password (ConvertTo-SecureString $pass -AsPlainText -Force) -FullName $user
              Add-LocalGroupMember -Group "Administrators" -Member $user
          } else {
              Set-LocalUser -Name $user -Password (ConvertTo-SecureString $pass -AsPlainText -Force)
          }

      - name: Set Solid Black Wallpaper
        run: |
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name Wallpaper -Value ''
          rundll32.exe user32.dll, UpdatePerUserSystemParameters

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Install Selected Applications
        run: |
          winget install -e --id Mozilla.Firefox --silent
          winget install -e --id Roblox.RobloxStudio --silent
          winget install -e --id OBSProject.OBSStudio --silent
          winget install -e --id Notepad++.Notepad++ --silent

      - name: Keep Runner Alive
        run: |
          Write-Host 'VM is fully set up and connected via Tailscale!'
          Start-Sleep -Seconds 21600
