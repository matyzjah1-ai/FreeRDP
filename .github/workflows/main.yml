name: macOS Remote Desktop

on:
  workflow_dispatch:

jobs:
  remote-desktop:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Runner User Password & Enable VNC
        run: |
          # 1. Set password for 'runner' using pipe into standard passwd
          printf "Password123!\nPassword123!\n" | sudo passwd runner
          
          # 2. Enable built-in macOS Screen Sharing / VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw Password123! \
            -restart -agent -privs -all

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Output Tailscale IP & Connection Info
        run: |
          TS_IP=$(tailscale ip -4)
          echo "=========================================================="
          echo " macOS VNC Server Ready!"
          echo " Tailscale IP: $TS_IP"
          echo " VNC Address:  vnc://$TS_IP"
          echo " Username:     runner"
          echo " Password:     Password123!"
          echo "=========================================================="

      - name: Keep Runner Alive
        run: |
          echo "Waiting for remote desktop session..."
          sleep 7200
